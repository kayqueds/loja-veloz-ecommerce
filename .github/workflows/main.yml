name: Build-Test-Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f services/pedidos/requirements.txt ]; then pip install -r services/pedidos/requirements.txt; fi
      - name: Run tests
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q || true; else echo "No pytest found"; fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-lint
    strategy:
      matrix:
        service: [api-gateway, pedidos, estoque, pagamentos]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ secrets.REGISTRY }}/${{ secrets.REGISTRY_USERNAME }}/${{ matrix.service }}:latest
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.REGISTRY }}/${{ secrets.REGISTRY_USERNAME }}/${{ matrix.service }}:latest